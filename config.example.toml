# Salita configuration example
# Copy to ~/.salita/config.toml and customize

[server]
host = "0.0.0.0"
port = 6969

# Maximum bytes to read from a single file via MCP (default: 10MB)
# max_read_bytes = 10485760

# Directories to expose to the mesh
# Each directory has a label (used in API calls) and a filesystem path

[[directories]]
label = "documents"
path = "~/Documents"

[[directories]]
label = "projects"
path = "~/Projects"

# [[directories]]
# label = "photos"
# path = "~/Photos"
